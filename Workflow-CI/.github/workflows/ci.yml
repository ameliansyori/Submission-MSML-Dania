name: Machine Learning Workflow CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  mlflow-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Set up job & Run actions/checkout@v3
    - name: Run actions/checkout@v3
      uses: actions/checkout@v3

    # 2. Set up Python 3.12.7 (Sesuai spek gambar instruksi lo)
    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: "3.12.7"

    # 3. Check Env
    - name: Check Env
      run: |
        echo "Checking operating system and python environment..."
        python --version
        pip --version

    # 4. Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow psutil flask numpy pandas scikit-learn
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 5. Run mlflow project
    - name: Run mlflow project
      run: |
        echo "Starting MLflow automated training using MLproject..."
        mlflow run . --no-conda

    # 6. Get latest MLflow run_id
    - name: Get latest MLflow run_id
      run: |
        echo "Extracting the latest artifact run ID..."
        RUN_ID=$(ls -t mlruns/0/ | head -n 1)
        echo "Latest Run ID found: $RUN_ID"

    # 7. 🌟 SYARAT SKILLED: Upload Artefak Model ke GitHub Repo
    - name: Upload to GitHub
      uses: actions/upload-artifact@v3
      with:
        name: trained-mlflow-model
        path: mlruns/0/
